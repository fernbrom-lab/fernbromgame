<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙 - 第七關</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50 overflow-hidden">
    <div class="h-screen w-full flex flex-col md:flex-row">
        <div class="w-full h-[35%] md:h-full md:w-5/12 bg-sky-400 flex flex-col items-center justify-center p-6 text-center text-white">
            <img src="till.png" class="w-40 md:w-80 mb-4 drop-shadow-2xl">
            <div class="bg-white/90 p-4 rounded-2xl shadow-xl w-full max-w-sm border-l-8 border-sky-600 text-black text-left">
                <h2 class="text-xl font-black text-sky-800">空空 Till</h2>
                <p id="dialog">準備好了嗎？點擊飛舞的包裹，將綠色知識傳向雲端！</p>
            </div>
        </div>
        <div class="w-full h-[65%] md:h-full md:w-7/12 flex items-center justify-center p-8 bg-sky-50">
            <button onclick="send()" id="package" class="text-9xl animate-bounce transition-all duration-500 hover:scale-110">📦</button>
        </div>
    </div>
    <script>
        let s = 0;
        function send() {
            s++;
            document.getElementById('package').style.transform = `translateY(-300px) scale(0)`;
            setTimeout(() => {
                if (s >= 3) {
                    document.getElementById('dialog').innerText = "任務達成！綠色宇宙正式開啟！";
                    setTimeout(() => { window.location.href = 'final.html'; }, 1500);
                } else {
                    document.getElementById('package').style.transform = `translateY(0) scale(1)`;
                }
            }, 500);
        }
    </script>
</body>
</html>
