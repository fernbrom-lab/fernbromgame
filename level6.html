<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙 - 第六關</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 overflow-hidden">
    <div class="h-screen w-full flex flex-col md:flex-row">
        <div class="w-full h-[35%] md:h-full md:w-5/12 bg-indigo-500 flex flex-col items-center justify-center p-6 text-center text-white">
            <img src="ficus.png" class="w-40 md:w-80 mb-4 drop-shadow-2xl">
            <div class="bg-white/90 p-4 rounded-2xl shadow-xl w-full max-w-sm border-l-8 border-indigo-700 text-black text-left">
                <h2 class="text-xl font-black">琴哥 Ficus</h2>
                <p id="dialog">平衡才是最美的。拉動滑桿，讓能量指標停在中間綠色區！</p>
            </div>
        </div>
        <div class="w-full h-[65%] md:h-full md:w-7/12 flex flex-col items-center justify-center p-8">
            <div class="text-9xl mb-12">🎵</div>
            <div class="w-full max-w-md relative p-4 bg-white rounded-3xl shadow-xl">
                <div class="h-4 w-full bg-gray-200 rounded-full relative overflow-hidden">
                    <div class="absolute inset-y-0 left-[40%] right-[40%] bg-green-300"></div>
                </div>
                <input type="range" min="0" max="100" value="0" oninput="checkBalance(this.value)" class="w-full mt-6 h-4 bg-transparent appearance-none cursor-pointer accent-indigo-600">
            </div>
        </div>
    </div>
    <script>
        function checkBalance(val) {
            if (val > 40 && val < 60) {
                document.getElementById('dialog').innerText = "這首曲子真優雅。最後一關，空空在等你。";
                setTimeout(() => { window.location.href = 'level7.html'; }, 1500);
            }
        }
    </script>
</body>
</html>
