<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植生牆遊戲 · 第五步：驗收與碳排評估</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: #1a472a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 900px;
            width: 100%;
            background: #fef7e0;
            border-radius: 48px;
            padding: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a3b1e;
            border-left: 8px solid #2e7d32;
            padding-left: 20px;
            margin-top: 0;
        }
        .section {
            background: #eef5e8;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 16px;
            color: #1a5a1a;
            border-bottom: 2px solid #cddba6;
            padding-bottom: 8px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px dashed #cddba6;
        }
        .badge {
            background: #2b5e2f;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .score-box {
            text-align: center;
            background: #fff5e0;
            border-radius: 28px;
            padding: 20px;
            margin: 16px 0;
        }
        .score-number {
            font-size: 3rem;
            font-weight: bold;
            color: #2b5e2f;
        }
        .carbon-number {
            font-size: 2rem;
            font-weight: bold;
            color: #2b5e2f;
        }
        .warning-text {
            background: #ffe0b5;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
            color: #a35100;
        }
        .success-text {
            background: #c8e6b5;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
            color: #1a5a1a;
        }
        .plant-list-small {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .plant-tag {
            background: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.8rem;
            border: 1px solid #cddba6;
        }
        .flex-btns {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        button {
            background: #2b5e2f;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            flex: 1;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #7f8c5e;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8a9a6e;
            margin-top: 24px;
        }
        .progress-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📋 第五步 · 驗收與碳排評估</h1>

    <div class="section">
        <div class="section-title">🌿 植生牆基本資料</div>
        <div class="info-row">
            <span>📍 設置地點</span>
            <span id="locationDisplay">-</span>
        </div>
        <div class="info-row">
            <span>📐 面積</span>
            <span id="areaDisplay">-</span>
        </div>
        <div class="info-row">
            <span>🌱 總植株數</span>
            <span id="totalPlantsDisplay">-</span>
        </div>
        <div class="info-row">
            <span>👷 施工人數</span>
            <span id="workerCountDisplay">-</span>
        </div>
        <div class="plant-list-small" id="plantList"></div>
    </div>

    <div class="section">
        <div class="section-title">📑 合約驗收評分</div>
        <div class="score-box">
            <div class="score-number" id="contractScore">0</div>
            <div>總分 / 100</div>
            <div id="contractGrade" class="badge" style="display:inline-block; margin-top:8px;">-</div>
        </div>
        <div id="contractDetail"></div>
    </div>

    <div class="section">
        <div class="section-title">🌎 碳排與固碳結算</div>
        <div class="info-row">
            <span>🔨 施工階段碳排</span>
            <span id="carbonConstruct">-</span>
        </div>
        <div class="info-row">
            <span>🌿 每年固碳量</span>
            <span id="carbonSequest">-</span>
        </div>
        <div class="info-row">
            <span>⏳ 碳中和所需年數</span>
            <span id="carbonPayback">-</span>
        </div>
        <div id="carbonDetail"></div>
    </div>

    <div class="section">
        <div class="section-title">🔮 未來模樣預測</div>
        <div id="futureDesc" class="info-row" style="flex-direction:column; gap:8px;">
            -
        </div>
    </div>

    <div class="flex-btns">
        <button id="restartBtn" class="btn-secondary">🌍 重新開始</button>
        <button id="printBtn">📄 輸出報告</button>
    </div>
    <footer>🌱 正確的植物搭配與環境選擇，能讓植生牆更快達成碳中和！</footer>
</div>

<script>
    // 植物資料
    const PLANTS = [
        { id: 0, name: "綠葉鵝掌藤", color: "#5b8c5a", carbonFactor: 1.25, suitable: { outdoor: true, indoor: true } },
        { id: 1, name: "蔓榕", color: "#6f9e6f", carbonFactor: 1.3, suitable: { outdoor: true, indoor: false } },
        { id: 2, name: "粗勒草", color: "#4c8b5e", carbonFactor: 1.15, suitable: { outdoor: false, indoor: true } },
        { id: 3, name: "腎蕨", color: "#7dab73", carbonFactor: 1.2, suitable: { outdoor: true, indoor: true } },
        { id: 4, name: "鹿角蕨", color: "#92b881", carbonFactor: 1.35, suitable: { outdoor: true, indoor: true } },
        { id: 5, name: "積水鳳梨", color: "#d98c5f", carbonFactor: 1.1, suitable: { outdoor: true, indoor: true } }
    ];

    // 從 localStorage 讀取資料
    let area = 0;
    let totalPlants = 0;
    let siteLocation = "";
    let quantities = [];
    let workers = [];
    let workerCount = 0;
    let finishedPixels = 0;

    function loadData() {
        area = parseInt(localStorage.getItem('greenwall_area')) || 10;
        totalPlants = parseInt(localStorage.getItem('greenwall_total_plants')) || 400;
        siteLocation = localStorage.getItem('greenwall_location') || 'outdoor';
        finishedPixels = parseInt(localStorage.getItem('greenwall_finished_pixels')) || 0;
        
        const storedQuantities = localStorage.getItem('greenwall_quantities');
        quantities = storedQuantities ? JSON.parse(storedQuantities) : [0, 0, 0, 0, 0, 0];
        
        const storedWorkers = localStorage.getItem('greenwall_workers');
        workers = storedWorkers ? JSON.parse(storedWorkers) : [];
        workerCount = workers.length;
    }

    function renderBasicInfo() {
        document.getElementById('locationDisplay').innerHTML = siteLocation === 'outdoor' ? '🌞 室外植生牆' : '🏠 室內植生牆';
        document.getElementById('areaDisplay').innerHTML = `${area} m²`;
        document.getElementById('totalPlantsDisplay').innerHTML = `${totalPlants} 株`;
        document.getElementById('workerCountDisplay').innerHTML = `${workerCount} 人`;
        
        const plantContainer = document.getElementById('plantList');
        plantContainer.innerHTML = '';
        for (let i = 0; i < PLANTS.length; i++) {
            const qty = quantities[i];
            if (qty > 0) {
                const tag = document.createElement('span');
                tag.className = 'plant-tag';
                tag.innerHTML = `${PLANTS[i].name} × ${qty} 株`;
                plantContainer.appendChild(tag);
            }
        }
    }

    function calculateContractScore() {
        let score = 60;
        let details = [];
        
        // 1. 植物環境匹配度檢查
        let mismatchCount = 0;
        for (let i = 0; i < PLANTS.length; i++) {
            if (quantities[i] > 0) {
                const isMatch = PLANTS[i].suitable[siteLocation];
                if (!isMatch) {
                    mismatchCount++;
                    details.push(`⚠️ ${PLANTS[i].name} 不適合${siteLocation === 'outdoor' ? '室外' : '室內'}環境，建議調整`);
                }
            }
        }
        
        if (mismatchCount === 0) {
            score += 20;
            details.push('✅ 所有植物與環境完美匹配！');
        } else {
            score -= mismatchCount * 8;
            details.push(`⚠️ 有 ${mismatchCount} 種植物環境不匹配，影響長期存活率`);
        }
        
        // 2. 施工完成度
        if (finishedPixels >= totalPlants) {
            score += 15;
            details.push('✅ 施工完成度 100%');
        } else {
            score -= 20;
            details.push('❌ 施工未完全完成');
        }
        
        // 3. 面積合理性
        if (area >= 5 && area <= 20) {
            score += 5;
        }
        
        // 4. 植物多樣性加分
        const plantTypesUsed = quantities.filter(q => q > 0).length;
        if (plantTypesUsed >= 4) {
            score += 8;
            details.push('🌱 植物多樣性豐富 (+8)');
        } else if (plantTypesUsed >= 2) {
            score += 4;
            details.push('🌱 植物多樣性良好 (+4)');
        }
        
        // 5. 人數效率
        if (workerCount >= 5) {
            score += 5;
            details.push('👥 團隊人力充足，施工效率高 (+5)');
        }
        
        score = Math.min(100, Math.max(0, score));
        
        let grade = '';
        if (score >= 85) grade = '🏅 優良合約 · 金牌綠牆';
        else if (score >= 70) grade = '🌿 合格合約 · 銀牌綠牆';
        else if (score >= 60) grade = '📋 基本合約 · 銅牌綠牆';
        else grade = '⚠️ 待改善合約';
        
        document.getElementById('contractScore').innerText = score;
        document.getElementById('contractGrade').innerHTML = grade;
        
        const detailDiv = document.getElementById('contractDetail');
        detailDiv.innerHTML = details.map(d => `<div class="${d.includes('✅') ? 'success-text' : 'warning-text'}">${d}</div>`).join('');
        
        return score;
    }

    function calculateCarbon() {
        const isOutdoor = siteLocation === 'outdoor';
        
        // 施工碳排公式
        let constructEm = area * 4.5 + workerCount * 7.2 + (isOutdoor ? 18 : 12);
        
        // 計算平均植物固碳係數（加權平均）
        let totalCarbonFactor = 0;
        let totalQuantity = 0;
        for (let i = 0; i < PLANTS.length; i++) {
            const qty = quantities[i];
            if (qty > 0) {
                totalCarbonFactor += PLANTS[i].carbonFactor * qty;
                totalQuantity += qty;
            }
        }
        const avgCarbonFactor = totalQuantity > 0 ? totalCarbonFactor / totalQuantity : 1.0;
        
        // 環境匹配懲罰：不匹配的植物會降低固碳效率
        let matchPenalty = 1.0;
        let mismatchPlants = [];
        for (let i = 0; i < PLANTS.length; i++) {
            if (quantities[i] > 0 && !PLANTS[i].suitable[siteLocation]) {
                mismatchPlants.push(PLANTS[i].name);
                matchPenalty -= 0.1;
            }
        }
        matchPenalty = Math.max(0.6, matchPenalty);
        
        // 年固碳量
        let baseSequest = isOutdoor ? 3.2 : 1.6;
        let yearlySequest = area * baseSequest * avgCarbonFactor * matchPenalty;
        
        // 碳中和年數
        let paybackYears = yearlySequest > 0 ? (constructEm / yearlySequest) : 999;
        paybackYears = Math.ceil(paybackYears * 10) / 10;
        
        document.getElementById('carbonConstruct').innerHTML = `${constructEm.toFixed(1)} kgCO₂e`;
        document.getElementById('carbonSequest').innerHTML = `${yearlySequest.toFixed(1)} kgCO₂e / 年`;
        document.getElementById('carbonPayback').innerHTML = `${paybackYears} 年`;
        
        let carbonDetailHtml = '';
        if (mismatchPlants.length > 0) {
            carbonDetailHtml += `<div class="warning-text">⚠️ ${mismatchPlants.join('、')} 環境不匹配，固碳效率降低 ${Math.round((1 - matchPenalty) * 100)}%</div>`;
        }
        if (paybackYears <= 5) {
            carbonDetailHtml += `<div class="success-text">🎉 恭喜！此植生牆將在 ${paybackYears} 年內達成碳中和！</div>`;
        } else if (paybackYears <= 10) {
            carbonDetailHtml += `<div class="success-text">🌱 此植生牆預計 ${paybackYears} 年達成碳中和，表現良好。</div>`;
        } else {
            carbonDetailHtml += `<div class="warning-text">⚠️ 碳中和需 ${paybackYears} 年，建議優化植物選擇與環境匹配。</div>`;
        }
        
        document.getElementById('carbonDetail').innerHTML = carbonDetailHtml;
        
        return { constructEm, yearlySequest, paybackYears };
    }

    function renderFuturePrediction() {
        const isOutdoor = siteLocation === 'outdoor';
        let futureText = '';
        
        // 檢查是否有不匹配的植物
        let mismatchNames = [];
        for (let i = 0; i < PLANTS.length; i++) {
            if (quantities[i] > 0 && !PLANTS[i].suitable[siteLocation]) {
                mismatchNames.push(PLANTS[i].name);
            }
        }
        
        if (mismatchNames.length > 0) {
            futureText = `⚠️ 未來預測：${mismatchNames.join('、')} 因環境不適應，可能生長不良或枯萎。建議更換為適合${isOutdoor ? '室外' : '室內'}的品種。`;
        } else {
            const goodPlants = PLANTS.filter((_, i) => quantities[i] > 0 && PLANTS[i].suitable[siteLocation]);
            if (goodPlants.length > 0) {
                const plantNames = goodPlants.map(p => p.name).join('、');
                if (isOutdoor) {
                    futureText = `🌳 未來預測：${plantNames} 在戶外陽光充足環境下將蓬勃生長，形成茂密的綠色牆面，吸引蝴蝶與鳥類，成為都市中的生態亮點！`;
                } else {
                    futureText = `🏡 未來預測：${plantNames} 在室內穩定環境中將持續生長，淨化空氣、調節濕度，為空間帶來舒適與療癒感。`;
                }
            } else {
                futureText = `🌱 未來預測：植生牆將逐漸適應環境，持續發揮固碳與美化功能。`;
            }
        }
        
        document.getElementById('futureDesc').innerHTML = futureText;
    }

    function restartGame() {
        if (confirm('重新開始將會清除所有遊戲進度，確定嗎？')) {
            localStorage.clear();
            window.location.href = 'step1_select.html';
        }
    }

    function printReport() {
        const score = document.getElementById('contractScore').innerText;
        const grade = document.getElementById('contractGrade').innerText;
        const construct = document.getElementById('carbonConstruct').innerText;
        const sequest = document.getElementById('carbonSequest').innerText;
        const payback = document.getElementById('carbonPayback').innerText;
        
        const report = `
🌿 植生牆碳排評估報告 🌿
========================
📐 面積：${area} m²
📍 地點：${siteLocation === 'outdoor' ? '室外' : '室內'}
🌱 總株數：${totalPlants} 株
👷 施工人數：${workerCount} 人

📑 合約評分：${score} / 100
🏅 評級：${grade}

🌎 碳排結算：
🔨 施工碳排：${construct}
🌿 年固碳量：${sequest}
⏳ 碳中和年數：${payback}

========================
感謝您參與綠色建設！
        `;
        alert('報告已複製到剪貼簿！');
        navigator.clipboard.writeText(report);
    }

    // 初始化
    loadData();
    renderBasicInfo();
    calculateContractScore();
    calculateCarbon();
    renderFuturePrediction();
    
    document.getElementById('restartBtn').onclick = restartGame;
    document.getElementById('printBtn').onclick = printReport;
</script>
</body>
</html>
