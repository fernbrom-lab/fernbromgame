<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蕨積綠色宇宙 - 第四關：碳分子淨化特訓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0f172a;
            overflow: hidden;
            touch-action: pan-x pan-y; /* 保留垂直滾動但防止縮放 */
        }
        /* 角色漂浮 */
        .character-float {
            animation: float 3.5s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        /* 碳分子飄移 */
        .carbon-particle {
            will-change: left;
            transition: left linear;
            cursor: pointer;
            filter: drop-shadow(0 0 6px rgba(0,0,0,0.5));
            z-index: 20;
            touch-action: manipulation;
        }
        /* 點擊特效：浮字 */
        .float-number {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.8rem;
            color: #4ade80;
            text-shadow: 0 0 6px #14532d;
            z-index: 1000;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(0.6); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.2); }
        }
        /* 綠色爆炸光圈 */
        .burst {
            position: fixed;
            pointer-events: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, #4ade80, #22c55e);
            filter: blur(6px);
            animation: burstFade 0.4s ease-out forwards;
            z-index: 999;
        }
        @keyframes burstFade {
            0% { opacity: 0.8; transform: scale(0.2); }
            100% { opacity: 0; transform: scale(1.8); }
        }
        .bubble-glow {
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2) inset;
        }
        .progress-fill {
            transition: width 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .clear-flash {
            animation: atmosphereClear 0.8s ease-out 2;
        }
        @keyframes atmosphereClear {
            0% { background-color: rgba(34,197,94,0); }
            50% { background-color: rgba(34,197,94,0.25); }
            100% { background-color: rgba(34,197,94,0); }
        }
        /* 手機按鈕區域加大 */
        .carbon-particle {
            min-width: 70px;
            text-align: center;
        }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden antialiased">

<div class="h-screen w-full flex flex-col md:flex-row relative">
    
    <!-- 左側虎妹區（夜行風格） -->
    <div class="w-full md:w-5/12 bg-gradient-to-br from-slate-800 to-slate-900 flex flex-col items-center justify-center p-5 relative shadow-2xl z-10 border-r border-white/10">
        <div class="absolute inset-0 opacity-20 pointer-events-none overflow-hidden">
            <div class="absolute top-8 left-5 text-2xl">⭐</div>
            <div class="absolute bottom-20 right-8 text-3xl">🌙</div>
            <div class="absolute top-1/3 left-1/4 text-xl">✨</div>
        </div>
        <div class="character-float relative z-20">
            <div class="bg-white/10 backdrop-blur-sm rounded-full p-3 shadow-2xl border border-white/20">
                <img src="sans.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616489.png';" class="w-36 h-36 md:w-44 md:h-44 object-contain drop-shadow-xl">
            </div>
        </div>
        <div class="mt-6 w-full max-w-sm relative z-20">
            <div class="bg-gray-800/90 backdrop-blur-md rounded-3xl p-5 shadow-2xl border-l-[10px] border-emerald-500 bubble-glow text-white">
                <div class="flex items-start gap-2">
                    <span class="text-3xl">🐯</span>
                    <div class="flex-1">
                        <h3 class="font-black text-xl text-emerald-300">虎妹 Sans · 夜行淨化者</h3>
                        <p id="dialog" class="text-gray-200 font-medium mt-1 text-base">🌑 碳分子飄過，快速點擊捕捉！淨化空氣就靠你。</p>
                    </div>
                </div>
            </div>
            <div class="absolute -bottom-2 left-8 w-4 h-4 bg-gray-800/90 rotate-45 rounded-sm"></div>
        </div>
        <div class="absolute bottom-4 left-0 right-0 text-center text-white/50 text-xs font-medium md:block hidden">
            💨 點擊漂浮 CO₂ 分子，每捕捉一個 = 減少 2kg 碳排放
        </div>
    </div>

    <!-- 右側遊戲區（碳分子獵場） -->
    <div class="w-full md:w-7/12 bg-gradient-to-br from-slate-950 to-black flex flex-col relative overflow-hidden">
        <!-- 進度面板 -->
        <div class="absolute top-4 left-0 right-0 z-30 px-5 pointer-events-none">
            <div class="bg-black/60 backdrop-blur-md rounded-2xl p-3 border border-white/20 shadow-xl pointer-events-auto">
                <div class="flex justify-between items-center flex-wrap gap-2">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">🌫️</span>
                        <span class="font-black text-white text-sm md:text-base">碳捕獲進度</span>
                    </div>
                    <div class="bg-emerald-900/80 text-emerald-300 px-4 py-1.5 rounded-full font-black text-xl">
                        <span id="captureCount">0</span> / <span id="targetTotal">10</span>
                    </div>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2.5 mt-2 overflow-hidden">
                    <div id="captureProgress" class="progress-fill bg-gradient-to-r from-emerald-500 to-green-400 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-2 text-xs text-gray-300">
                    <span>⚡ 即時減碳：<span id="liveCarbon">0</span> kg CO₂e</span>
                    <span>🎯 目標：捕獲 <span id="targetNumSpan">10</span> 個</span>
                </div>
            </div>
        </div>

        <!-- 動態遊戲區 -->
        <div id="game-area" class="relative w-full h-full overflow-hidden touch-auto">
            <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle fill=%22rgba(255,255,255,0.03)%22 cx=%2250%22 cy=%2250%22 r=%221%22/%3E%3C/svg%3E')] bg-repeat pointer-events-none"></div>
            <div class="absolute bottom-6 left-0 right-0 text-center text-white/30 text-xs pointer-events-none">
                💧 點擊飄動的 🌑 分子，淨化它們！
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- 遊戲設定 -----
        const TARGET_CAPTURES = 10;
        let currentCaptured = 0;
        let isGameCompleted = false;
        let activeMolecules = [];
        let spawnInterval = null;

        // DOM 元素
        const dialogEl = document.getElementById('dialog');
        const captureCountSpan = document.getElementById('captureCount');
        const targetTotalSpan = document.getElementById('targetTotal');
        const captureProgressBar = document.getElementById('captureProgress');
        const liveCarbonSpan = document.getElementById('liveCarbon');
        const gameArea = document.getElementById('game-area');

        targetTotalSpan.innerText = TARGET_CAPTURES;
        document.getElementById('targetNumSpan').innerText = TARGET_CAPTURES;

        // 更新 UI
        function updateStatsUI() {
            captureCountSpan.innerText = currentCaptured;
            const percent = (currentCaptured / TARGET_CAPTURES) * 100;
            captureProgressBar.style.width = `${percent}%`;
            const savedCarbon = currentCaptured * 2;
            liveCarbonSpan.innerText = savedCarbon;

            if (!isGameCompleted) {
                if (currentCaptured === TARGET_CAPTURES) {
                    dialogEl.innerText = "✨ 特訓完美達標！空氣煥然一新！快去找肉肉吧 🌿✨";
                } else if (currentCaptured >= TARGET_CAPTURES - 3) {
                    dialogEl.innerText = `⚡ 只差 ${TARGET_CAPTURES - currentCaptured} 個！再加把勁！`;
                } else if (currentCaptured >= TARGET_CAPTURES / 2) {
                    dialogEl.innerText = `🌙 已淨化 ${currentCaptured} 個碳分子，減碳 ${savedCarbon}kg！繼續努力～`;
                } else if (currentCaptured > 0) {
                    dialogEl.innerText = `🌑 捕獲 ${currentCaptured} 個！點擊飄過的暗影，淨化大氣！`;
                } else {
                    dialogEl.innerText = "🌫️ 碳分子從左至右飄移，快速點擊它們！目標10個！";
                }
            }
        }

        // ----- 特效（手機優化版）-----
        function createPlusEffect(x, y) {
            // 浮字
            const floatDiv = document.createElement('div');
            floatDiv.innerText = '+2 kg🌱';
            floatDiv.className = 'float-number';
            floatDiv.style.left = (x - 20) + 'px';
            floatDiv.style.top = (y - 30) + 'px';
            document.body.appendChild(floatDiv);
            setTimeout(() => floatDiv.remove(), 800);
            
            // 爆炸光圈
            const burstDiv = document.createElement('div');
            burstDiv.className = 'burst';
            burstDiv.style.left = (x - 20) + 'px';
            burstDiv.style.top = (y - 20) + 'px';
            document.body.appendChild(burstDiv);
            setTimeout(() => burstDiv.remove(), 400);
            
            if (navigator.vibrate) navigator.vibrate(30);
        }

        // 取得可靠的點擊座標（手機 / PC）
        function getClickCoords(event, fallbackElement) {
            let clientX, clientY;
            if (event.touches && event.touches.length) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else if (event.clientX !== undefined) {
                clientX = event.clientX;
                clientY = event.clientY;
            } else if (fallbackElement) {
                const rect = fallbackElement.getBoundingClientRect();
                clientX = rect.left + rect.width/2;
                clientY = rect.top + rect.height/2;
            }
            return { x: clientX, y: clientY };
        }

        // 捕捉分子
        function captureMolecule(moleculeElement, event) {
            if (isGameCompleted) return;
            if (!moleculeElement || !document.body.contains(moleculeElement)) return;
            if (moleculeElement.getAttribute('data-captured') === 'true') return;
            moleculeElement.setAttribute('data-captured', 'true');

            // 取得座標並產生特效
            const coords = getClickCoords(event, moleculeElement);
            if (coords.x && coords.y) {
                createPlusEffect(coords.x, coords.y);
            } else {
                // 保底：用分子自身位置
                const rect = moleculeElement.getBoundingClientRect();
                createPlusEffect(rect.left + rect.width/2, rect.top + rect.height/2);
            }

            // 移除分子
            if (moleculeElement.parentNode) moleculeElement.remove();
            const idx = activeMolecules.indexOf(moleculeElement);
            if (idx !== -1) activeMolecules.splice(idx, 1);

            currentCaptured++;
            updateStatsUI();

            if (currentCaptured >= TARGET_CAPTURES) {
                completeGame();
            } else {
                adjustSpawnRate();
            }
        }

        // 動態調整生成速度
        function adjustSpawnRate() {
            if (isGameCompleted) return;
            if (spawnInterval) clearInterval(spawnInterval);
            let newDelay = Math.max(600, 1100 - Math.floor(currentCaptured / 2) * 40);
            newDelay = Math.min(newDelay, 1300);
            spawnInterval = setInterval(() => {
                if (!isGameCompleted && activeMolecules.length < 18) {
                    createCarbonMolecule();
                }
            }, newDelay);
        }

        // 產生碳分子（手機觸控區域加大）
        function createCarbonMolecule() {
            if (isGameCompleted) return;
            const molecule = document.createElement('div');
            const randomIcon = Math.random() < 0.8 ? '🌑' : (Math.random() < 0.6 ? '💨' : '🌫️');
            molecule.innerText = randomIcon;
            molecule.className = 'carbon-particle absolute text-5xl md:text-6xl cursor-pointer select-none';
            molecule.style.fontSize = 'clamp(2.5rem, 10vw, 4rem)';
            molecule.style.padding = '8px';
            molecule.style.minWidth = '70px';
            molecule.style.textAlign = 'center';
            
            const topPercent = 10 + Math.random() * 75;
            molecule.style.top = topPercent + '%';
            molecule.style.left = '-100px';
            const duration = 2.5 + Math.random() * 2.5;
            molecule.style.transition = `left ${duration}s linear`;
            
            // 點擊綁定
            const clickHandler = (e) => {
                e.preventDefault();
                e.stopPropagation();
                captureMolecule(molecule, e);
            };
            molecule.addEventListener('click', clickHandler);
            molecule.addEventListener('touchstart', clickHandler, { passive: false });
            
            gameArea.appendChild(molecule);
            activeMolecules.push(molecule);
            
            // 開始移動
            setTimeout(() => {
                if (molecule && molecule.parentNode) {
                    molecule.style.left = 'calc(100% + 60px)';
                }
            }, 20);
            
            // 自動清除（未被點擊的）
            const timeout = setTimeout(() => {
                if (molecule && molecule.parentNode && !molecule.getAttribute('data-captured')) {
                    molecule.remove();
                    const idx2 = activeMolecules.indexOf(molecule);
                    if (idx2 !== -1) activeMolecules.splice(idx2, 1);
                }
            }, duration * 1000 + 300);
            molecule._timeout = timeout;
        }

        // 通關
        function completeGame() {
            if (isGameCompleted) return;
            isGameCompleted = true;
            if (spawnInterval) clearInterval(spawnInterval);
            for (let mol of activeMolecules) {
                if (mol && mol.parentNode) {
                    if (mol._timeout) clearTimeout(mol._timeout);
                    mol.remove();
                }
            }
            activeMolecules = [];
            dialogEl.innerText = "🎉 特訓完成！空氣變清新了！減碳成就突破天際！去找肉肉吧。";
            const rightPanel = document.querySelector('.md\\:w-7\\/12');
            if (rightPanel) rightPanel.classList.add('clear-flash');
            
            const finalMsg = document.createElement('div');
            finalMsg.innerText = '✨ 碳捕捉大師 ✨';
            finalMsg.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/80 text-emerald-400 font-black text-3xl px-8 py-4 rounded-2xl z-50 backdrop-blur border border-emerald-400 animate-pulse';
            document.body.appendChild(finalMsg);
            setTimeout(() => finalMsg.remove(), 1500);
            
            setTimeout(() => { window.location.href = 'level5.html'; }, 1800);
        }

        // 初始化
        function initGame() {
            currentCaptured = 0;
            isGameCompleted = false;
            activeMolecules.forEach(m => { if(m._timeout) clearTimeout(m._timeout); if(m.parentNode) m.remove(); });
            activeMolecules = [];
            updateStatsUI();
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if (!isGameCompleted && activeMolecules.length < 18) createCarbonMolecule();
            }, 1000);
        }

        // 圖片備援
        const sansImg = document.querySelector('img');
        if (sansImg) {
            sansImg.addEventListener('error', function() {
                this.onerror = null;
                this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle fill='%23334155' cx='50' cy='50' r='45'/%3E%3Ctext x='50' y='70' font-size='48' text-anchor='middle' fill='white'%3E🐯%3C/text%3E%3C/svg%3E";
            });
        }

        // 防止手機滑動導致頁面滾動
        gameArea.addEventListener('touchstart', (e) => {
            if (e.target.classList && e.target.classList.contains('carbon-particle')) {
                e.preventDefault();
            }
        }, { passive: false });
        
        // 啟動遊戲
        initGame();

        // 頁面可見性處理
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (spawnInterval) clearInterval(spawnInterval);
            } else {
                if (!isGameCompleted && !spawnInterval) {
                    spawnInterval = setInterval(() => {
                        if (!isGameCompleted && activeMolecules.length < 18) createCarbonMolecule();
                    }, 1000);
                }
            }
        });
        
        window.addEventListener('beforeunload', () => {
            if (spawnInterval) clearInterval(spawnInterval);
            activeMolecules.forEach(m => { if(m._timeout) clearTimeout(m._timeout); });
        });
    })();
</script>
</body>
</html>
