<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙 - 第四關</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 overflow-hidden">
    <div class="h-screen w-full flex flex-col md:flex-row">
        <div class="w-full h-[35%] md:h-full md:w-5/12 bg-slate-800 flex flex-col items-center justify-center p-6 text-white text-center">
            <img src="sans.png" class="w-40 md:w-80 mb-4 drop-shadow-2xl">
            <div class="bg-white/90 p-4 rounded-2xl shadow-xl w-full max-w-sm border-l-8 border-slate-600 text-black text-left">
                <h2 class="text-xl font-black text-slate-800">虎妹 Sans</h2>
                <p id="dialog">半夜特訓最安靜。點擊飄過的二氧化碳分子，將它們淨化！</p>
            </div>
        </div>
        <div class="w-full h-[65%] md:h-full md:w-7/12 relative bg-slate-950 flex items-center justify-center overflow-hidden">
            <div id="game-area" class="w-full h-full relative">
                <p class="text-slate-500 absolute top-4 w-full text-center">目標：捕獲 5 個 🌑</p>
            </div>
        </div>
    </div>
    <script>
        let score = 0;
        function createCarbon() {
            const carbon = document.createElement('div');
            carbon.innerText = '🌑';
            carbon.className = 'absolute text-6xl cursor-pointer transition-all duration-3000';
            carbon.style.top = Math.random() * 80 + '%';
            carbon.style.left = '-100px';
            carbon.onclick = function() {
                score++;
                this.remove();
                if (score >= 5) {
                    document.getElementById('dialog').innerText = "特訓完成！空氣變清新了。去找肉肉吧。";
                    setTimeout(() => { window.location.href = 'level5.html'; }, 1500);
                }
            };
            document.getElementById('game-area').appendChild(carbon);
            setTimeout(() => {
                carbon.style.left = '110%';
                setTimeout(() => carbon.remove(), 3000);
            }, 100);
        }
        setInterval(createCarbon, 1000);
    </script>
</body>
</html>
