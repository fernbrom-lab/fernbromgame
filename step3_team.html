<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植生牆遊戲 · 第三步：召集施工夥伴</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
            user-select: none;
        }
        body {
            background: #1a472a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 1000px;
            width: 100%;
            background: #fef7e0;
            border-radius: 48px;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a3b1e;
            border-left: 8px solid #2e7d32;
            padding-left: 20px;
            margin-top: 0;
        }
        .summary {
            background: #e0f0da;
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 0.9rem;
        }
        .two-columns {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .team-area {
            flex: 2;
            background: #fff5e0;
            border-radius: 32px;
            padding: 20px;
            border: 2px dashed #b3cf9b;
        }
        .truck-area {
            flex: 1;
            background: #e8f0e0;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            border: 2px solid #8aaa6e;
        }
        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }
        .member-card {
            background: white;
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            cursor: grab;
            transition: 0.1s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            border: 1px solid #cddba6;
        }
        .member-card:active {
            cursor: grabbing;
        }
        .member-card.dragging {
            opacity: 0.4;
        }
        .member-avatar {
            width: 70px;
            height: 70px;
            margin: 0 auto 8px;
            background: #d9e0c5;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            overflow: hidden;
        }
        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .member-name {
            font-size: 0.8rem;
            font-weight: bold;
        }
        .remove-icon {
            font-size: 0.7rem;
            color: #a35100;
            margin-top: 4px;
            cursor: pointer;
            opacity: 0.6;
        }
        .remove-icon:hover {
            opacity: 1;
        }
        .truck-icon {
            font-size: 4rem;
            margin: 10px 0;
        }
        .truck-team {
            background: #cddba6;
            border-radius: 28px;
            padding: 16px;
            min-height: 200px;
            margin: 16px 0;
        }
        .truck-member {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin: 6px;
            text-align: center;
            width: 70px;
            position: relative;
        }
        .truck-member .member-avatar {
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
        }
        .truck-member .member-name {
            font-size: 0.7rem;
        }
        .truck-member .remove-icon {
            font-size: 0.65rem;
            margin-top: 2px;
        }
        .counter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a5a1a;
        }
        .drop-zone {
            border: 3px dashed #8aaa6e;
            background: #f0f5ea;
            transition: 0.1s;
        }
        .drop-zone.drag-over {
            background: #d9e6b3;
            border-color: #2b5e2f;
        }
        button {
            background: #2b5e2f;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #7f8c5e;
            margin-top: 0;
        }
        .flex-btns {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        .warning {
            background: #ffe0b5;
            border-radius: 28px;
            padding: 10px;
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8a9a6e;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>👥 第三步 · 召集施工夥伴</h1>

    <div class="summary" id="summaryArea">載入中...</div>

    <div class="two-columns">
        <!-- 左邊：七個小夥伴 -->
        <div class="team-area">
            <div class="section-title">🌾 等待召集的夥伴</div>
            <div class="members-grid" id="membersGrid"></div>
            <div class="warning">💡 直接拖曳夥伴到右邊貨車上！點擊 ✖ 可移除</div>
        </div>

        <!-- 右邊：貨車（施工團隊） -->
        <div class="truck-area drop-zone" id="truckZone">
            <div class="section-title">🚛 施工貨車</div>
            <div class="truck-icon">🚛</div>
            <div class="truck-team" id="truckTeam"></div>
            <div>👷 施工人數：<span class="counter" id="workerCount">0</span> / 7</div>
        </div>
    </div>

    <div class="flex-btns">
        <button id="backBtn" class="btn-secondary">⬅ 返回植物分配</button>
        <button id="nextBtn" disabled>🚧 出發施工！</button>
    </div>
    <footer>🌱 人數越多，施工速度越快！最多 7 人。</footer>
</div>

<script>
    // 夥伴資料（7位）- 根據您提供的名稱調整
    const TEAM_MEMBERS = [
        { id: 0, name: "阿蕨", emoji: "🌿", imgFile: "brom.png" },
        { id: 1, name: "小積", emoji: "💧", imgFile: "fern.png" },
        { id: 2, name: "琴哥", emoji: "🎸", imgFile: "ficus.png" },
        { id: 3, name: "小龜", emoji: "🐢", imgFile: "mons.png" },
        { id: 4, name: "虎妹", emoji: "🐯", imgFile: "sans.png" },
        { id: 5, name: "肉肉", emoji: "🌵", imgFile: "succ.png" },
        { id: 6, name: "空空", emoji: "🎈", imgFile: "till.png" }
    ];

    // 從 localStorage 讀取前兩步資料
    let area = 0;
    let totalPlants = 0;
    let siteLocation = "";
    let quantities = [];

    // 施工團隊（被拖曳進貨車的夥伴）
    let selectedWorkers = [];

    function loadPreviousData() {
        area = parseInt(localStorage.getItem('greenwall_area')) || 10;
        totalPlants = parseInt(localStorage.getItem('greenwall_total_plants')) || 400;
        siteLocation = localStorage.getItem('greenwall_location') || 'outdoor';
        
        const storedQuantities = localStorage.getItem('greenwall_quantities');
        if (storedQuantities) {
            quantities = JSON.parse(storedQuantities);
        } else {
            quantities = [0, 0, 0, 0, 0, 0];
        }
        
        document.getElementById('summaryArea').innerHTML = `
            📐 面積：${area} m² &nbsp;|&nbsp;
            📍 ${siteLocation === 'outdoor' ? '室外' : '室內'} &nbsp;|&nbsp;
            🧱 總株數：${totalPlants} 株 &nbsp;|&nbsp;
            🌱 植物種類：${quantities.filter(q => q > 0).length} 種
        `;
    }

    // 渲染頭像（支援圖片）
    function renderAvatar(imgFile, emoji, size = "70px") {
        const sizeNum = parseInt(size);
        return `<img src="${imgFile}" 
                     onerror="this.style.display='none'; this.parentElement.innerHTML='${emoji}';"
                     style="width:${sizeNum}px; height:${sizeNum}px; object-fit:cover; border-radius:60px;">`;
    }

    function renderMembers() {
        const container = document.getElementById('membersGrid');
        container.innerHTML = '';
        
        TEAM_MEMBERS.forEach(member => {
            // 檢查是否已在貨車上
            const isSelected = selectedWorkers.some(w => w.id === member.id);
            if (isSelected) return;
            
            const card = document.createElement('div');
            card.className = 'member-card';
            card.setAttribute('draggable', 'true');
            card.setAttribute('data-id', member.id);
            card.setAttribute('data-name', member.name);
            card.setAttribute('data-emoji', member.emoji);
            card.setAttribute('data-img', member.imgFile);
            
            card.innerHTML = `
                <div class="member-avatar" id="avatar_${member.id}"></div>
                <div class="member-name">${member.name}</div>
            `;
            
            // 放入頭像
            const avatarDiv = card.querySelector(`#avatar_${member.id}`);
            if (avatarDiv) {
                avatarDiv.innerHTML = renderAvatar(member.imgFile, member.emoji, "70");
            }
            
            // 拖曳事件
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({
                    id: member.id,
                    name: member.name,
                    emoji: member.emoji,
                    imgFile: member.imgFile
                }));
                e.dataTransfer.effectAllowed = 'copy';
                card.classList.add('dragging');
            });
            card.addEventListener('dragend', (e) => {
                card.classList.remove('dragging');
            });
            
            container.appendChild(card);
        });
    }

    function removeWorker(workerId) {
        selectedWorkers = selectedWorkers.filter(w => w.id !== workerId);
        saveAndRender();
    }

    function renderTruck() {
        const container = document.getElementById('truckTeam');
        container.innerHTML = '';
        
        if (selectedWorkers.length === 0) {
            container.innerHTML = '<div style="color:#8a9a6e; text-align:center; padding:20px;">將夥伴拖曳到此處</div>';
        } else {
            selectedWorkers.forEach(worker => {
                const div = document.createElement('div');
                div.className = 'truck-member';
                div.innerHTML = `
                    <div class="member-avatar" id="truck_avatar_${worker.id}"></div>
                    <div class="member-name">${worker.name}</div>
                    <div class="remove-icon" data-id="${worker.id}">✖ 移除</div>
                `;
                container.appendChild(div);
                
                // 放入頭像
                const avatarDiv = div.querySelector(`#truck_avatar_${worker.id}`);
                if (avatarDiv) {
                    avatarDiv.innerHTML = renderAvatar(worker.imgFile, worker.emoji, "55");
                }
            });
            
            // 綁定移除事件
            document.querySelectorAll('.remove-icon').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(el.dataset.id);
                    removeWorker(id);
                });
            });
        }
        
        document.getElementById('workerCount').innerText = selectedWorkers.length;
        
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.disabled = selectedWorkers.length === 0;
        }
    }

    function saveAndRender() {
        // 儲存到 localStorage
        localStorage.setItem('greenwall_workers', JSON.stringify(selectedWorkers));
        localStorage.setItem('greenwall_worker_count', selectedWorkers.length);
        renderMembers();
        renderTruck();
    }

    function setupDragAndDrop() {
        const truckZone = document.getElementById('truckZone');
        
        truckZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            truckZone.classList.add('drag-over');
        });
        
        truckZone.addEventListener('dragleave', (e) => {
            truckZone.classList.remove('drag-over');
        });
        
        truckZone.addEventListener('drop', (e) => {
            e.preventDefault();
            truckZone.classList.remove('drag-over');
            
            const rawData = e.dataTransfer.getData('text/plain');
            if (!rawData) return;
            
            const member = JSON.parse(rawData);
            
            // 檢查是否已在團隊中
            if (selectedWorkers.some(w => w.id === member.id)) {
                alert(`${member.name} 已經在貨車上了！`);
                return;
            }
            
            if (selectedWorkers.length >= 7) {
                alert('貨車最多只能載 7 人！');
                return;
            }
            
            selectedWorkers.push(member);
            saveAndRender();
        });
    }

    function loadSavedWorkers() {
        const saved = localStorage.getItem('greenwall_workers');
        if (saved) {
            try {
                selectedWorkers = JSON.parse(saved);
                if (selectedWorkers.length > 7) selectedWorkers = selectedWorkers.slice(0, 7);
            } catch(e) { selectedWorkers = []; }
        }
    }

    function goBack() {
        window.location.href = 'step2_plants.html';
    }

    function goToConstruction() {
        if (selectedWorkers.length === 0) {
            alert('請至少選擇一位夥伴一起施工！');
            return;
        }
        
        // 儲存最終人數
        localStorage.setItem('greenwall_worker_count', selectedWorkers.length);
        localStorage.setItem('greenwall_workers', JSON.stringify(selectedWorkers));
        
        // 跳轉到第四步
        window.location.href = 'step4_construction.html';
    }

    // 初始化
    loadPreviousData();
    loadSavedWorkers();
    renderMembers();
    renderTruck();
    setupDragAndDrop();
    
    document.getElementById('backBtn').onclick = goBack;
    document.getElementById('nextBtn').onclick = goToConstruction;
</script>
</body>
</html>
