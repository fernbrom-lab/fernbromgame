<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>植生牆遊戲 · 第三步：召集施工夥伴</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a472a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 1000px;
            width: 100%;
            background: #fef7e0;
            border-radius: 48px;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a3b1e;
            border-left: 8px solid #2e7d32;
            padding-left: 20px;
            margin-top: 0;
            font-size: 1.6rem;
        }
        .summary {
            background: #e0f0da;
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 0.9rem;
        }
        .two-columns {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .team-area {
            flex: 2;
            background: #fff5e0;
            border-radius: 32px;
            padding: 20px;
            border: 2px dashed #b3cf9b;
        }
        .truck-area {
            flex: 1;
            background: #e8f0e0;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            border: 2px solid #8aaa6e;
        }
        .section-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }
        .member-card {
            background: white;
            border-radius: 20px;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            border: 1px solid #cddba6;
            -webkit-tap-highlight-color: transparent;
        }
        .member-card:active {
            transform: scale(0.96);
            background: #e8f0e0;
        }
        .member-avatar {
            width: 60px;
            height: 60px;
            margin: 0 auto 6px;
            background: #d9e0c5;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            overflow: hidden;
        }
        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .member-name {
            font-size: 0.75rem;
            font-weight: bold;
        }
        .add-icon {
            font-size: 0.7rem;
            color: #2b5e2f;
            margin-top: 4px;
        }
        .truck-icon {
            font-size: 3rem;
            margin: 10px 0;
        }
        .truck-team {
            background: #cddba6;
            border-radius: 28px;
            padding: 16px;
            min-height: 200px;
            margin: 16px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .truck-member {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 70px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .truck-member:active {
            transform: scale(0.96);
        }
        .truck-member .member-avatar {
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
        }
        .truck-member .member-name {
            font-size: 0.7rem;
        }
        .remove-icon {
            font-size: 0.65rem;
            color: #a35100;
            margin-top: 3px;
        }
        .counter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a5a1a;
        }
        .warning {
            background: #ffe0b5;
            border-radius: 28px;
            padding: 10px;
            margin-top: 16px;
            text-align: center;
            font-size: 0.8rem;
        }
        button {
            background: #2b5e2f;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #7f8c5e;
            margin-top: 0;
        }
        .flex-btns {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8a9a6e;
            margin-top: 24px;
        }
        @media (max-width: 700px) {
            .card { padding: 18px; }
            h1 { font-size: 1.3rem; }
            .members-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .member-avatar { width: 50px; height: 50px; font-size: 1.6rem; }
            .truck-member { width: 60px; }
            .truck-member .member-avatar { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>👥 第三步 · 召集施工夥伴</h1>

    <div class="summary" id="summaryArea">載入中...</div>

    <div class="two-columns">
        <!-- 左邊：七個小夥伴 -->
        <div class="team-area">
            <div class="section-title">🌾 等待召集的夥伴（點擊加入）</div>
            <div class="members-grid" id="membersGrid"></div>
            <div class="warning">💡 點擊夥伴 = 加入貨車｜點擊貨車上的夥伴 = 移除</div>
        </div>

        <!-- 右邊：貨車（施工團隊） -->
        <div class="truck-area">
            <div class="section-title">🚛 施工貨車（點擊移除）</div>
            <div class="truck-icon">🚛</div>
            <div class="truck-team" id="truckTeam"></div>
            <div>👷 施工人數：<span class="counter" id="workerCount">0</span> / 7</div>
        </div>
    </div>

    <div class="flex-btns">
        <button id="backBtn" class="btn-secondary">⬅ 返回植物分配</button>
        <button id="nextBtn" disabled>🚧 出發施工！</button>
    </div>
    <footer>🌱 人數越多，施工速度越快！最多 7 人。點擊即可加入/移除</footer>
</div>

<script>
    // 夥伴資料（7位）
    const TEAM_MEMBERS = [
        { id: 0, name: "阿蕨", emoji: "🌿", imgFile: "brom.png" },
        { id: 1, name: "小積", emoji: "💧", imgFile: "fern.png" },
        { id: 2, name: "琴哥", emoji: "🎸", imgFile: "ficus.png" },
        { id: 3, name: "小龜", emoji: "🐢", imgFile: "mons.png" },
        { id: 4, name: "虎妹", emoji: "🐯", imgFile: "sans.png" },
        { id: 5, name: "肉肉", emoji: "🌵", imgFile: "succ.png" },
        { id: 6, name: "空空", emoji: "🎈", imgFile: "till.png" }
    ];

    // 從 localStorage 讀取前兩步資料
    let area = 0;
    let totalPlants = 0;
    let siteLocation = "";
    let quantities = [];

    // 施工團隊（被選中的夥伴）
    let selectedWorkers = [];

    function loadPreviousData() {
        area = parseInt(localStorage.getItem('greenwall_area')) || 10;
        totalPlants = parseInt(localStorage.getItem('greenwall_total_plants')) || 400;
        siteLocation = localStorage.getItem('greenwall_location') || 'outdoor';
        
        const storedQuantities = localStorage.getItem('greenwall_quantities');
        if (storedQuantities) {
            quantities = JSON.parse(storedQuantities);
        } else {
            quantities = [0, 0, 0, 0, 0, 0];
        }
        
        document.getElementById('summaryArea').innerHTML = `
            📐 面積：${area} m² &nbsp;|&nbsp;
            📍 ${siteLocation === 'outdoor' ? '室外' : '室內'} &nbsp;|&nbsp;
            🧱 總株數：${totalPlants} 株 &nbsp;|&nbsp;
            🌱 植物種類：${quantities.filter(q => q > 0).length} 種
        `;
    }

    // 渲染頭像（支援圖片）
    function renderAvatar(imgFile, emoji, size = "60px") {
        const sizeNum = parseInt(size);
        return `<img src="${imgFile}" 
                     onerror="this.style.display='none'; this.parentElement.innerHTML='${emoji}';"
                     style="width:${sizeNum}px; height:${sizeNum}px; object-fit:cover; border-radius:60px;">`;
    }

    // 加入夥伴
    function addWorker(worker) {
        if (selectedWorkers.some(w => w.id === worker.id)) {
            // alert(`${worker.name} 已經在貨車上了！`);
            return false;
        }
        if (selectedWorkers.length >= 7) {
            alert('貨車最多只能載 7 人！');
            return false;
        }
        selectedWorkers.push(worker);
        return true;
    }

    // 移除夥伴
    function removeWorker(workerId) {
        selectedWorkers = selectedWorkers.filter(w => w.id !== workerId);
    }

    function renderMembers() {
        const container = document.getElementById('membersGrid');
        container.innerHTML = '';
        
        TEAM_MEMBERS.forEach(member => {
            const isSelected = selectedWorkers.some(w => w.id === member.id);
            if (isSelected) return;
            
            const card = document.createElement('div');
            card.className = 'member-card';
            card.setAttribute('data-id', member.id);
            
            card.innerHTML = `
                <div class="member-avatar" id="member_avatar_${member.id}"></div>
                <div class="member-name">${member.name}</div>
                <div class="add-icon">➕ 點擊加入</div>
            `;
            
            const avatarDiv = card.querySelector(`#member_avatar_${member.id}`);
            if (avatarDiv) {
                avatarDiv.innerHTML = renderAvatar(member.imgFile, member.emoji, "60");
            }
            
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (addWorker(member)) {
                    saveAndRender();
                }
            });
            
            container.appendChild(card);
        });
    }

    function renderTruck() {
        const container = document.getElementById('truckTeam');
        container.innerHTML = '';
        
        if (selectedWorkers.length === 0) {
            container.innerHTML = '<div style="color:#8a9a6e; text-align:center; padding:20px;">點擊左邊夥伴加入貨車</div>';
        } else {
            selectedWorkers.forEach(worker => {
                const div = document.createElement('div');
                div.className = 'truck-member';
                div.setAttribute('data-id', worker.id);
                div.innerHTML = `
                    <div class="member-avatar" id="truck_avatar_${worker.id}"></div>
                    <div class="member-name">${worker.name}</div>
                    <div class="remove-icon">✖ 點擊移除</div>
                `;
                container.appendChild(div);
                
                const avatarDiv = div.querySelector(`#truck_avatar_${worker.id}`);
                if (avatarDiv) {
                    avatarDiv.innerHTML = renderAvatar(worker.imgFile, worker.emoji, "55");
                }
                
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeWorker(worker.id);
                    saveAndRender();
                });
            });
        }
        
        document.getElementById('workerCount').innerText = selectedWorkers.length;
        
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.disabled = selectedWorkers.length === 0;
        }
    }

    function saveAndRender() {
        localStorage.setItem('greenwall_workers', JSON.stringify(selectedWorkers));
        localStorage.setItem('greenwall_worker_count', selectedWorkers.length);
        renderMembers();
        renderTruck();
    }

    function loadSavedWorkers() {
        const saved = localStorage.getItem('greenwall_workers');
        if (saved) {
            try {
                selectedWorkers = JSON.parse(saved);
                if (selectedWorkers.length > 7) selectedWorkers = selectedWorkers.slice(0, 7);
            } catch(e) { selectedWorkers = []; }
        }
    }

    function goBack() {
        window.location.href = 'step2_plants.html';
    }

    function goToConstruction() {
        if (selectedWorkers.length === 0) {
            alert('請至少選擇一位夥伴一起施工！');
            return;
        }
        
        localStorage.setItem('greenwall_worker_count', selectedWorkers.length);
        localStorage.setItem('greenwall_workers', JSON.stringify(selectedWorkers));
        
        window.location.href = 'step4_construction.html';
    }

    // 初始化
    loadPreviousData();
    loadSavedWorkers();
    renderMembers();
    renderTruck();
    
    document.getElementById('backBtn').onclick = goBack;
    document.getElementById('nextBtn').onclick = goToConstruction;
</script>
</body>
</html>
