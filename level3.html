<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙 - 第三關</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white overflow-hidden">
    <div class="h-screen w-full flex flex-col md:flex-row">
        <div class="w-full h-[35%] md:h-full md:w-5/12 bg-emerald-500 flex flex-col items-center justify-center p-6 text-white text-center">
            <img src="mons.png" class="w-40 md:w-80 mb-4 drop-shadow-2xl">
            <div class="bg-white/90 p-4 rounded-2xl shadow-xl w-full max-w-sm border-l-8 border-emerald-700 text-black">
                <h2 class="text-xl font-black">小龜 Monstera</h2>
                <p id="dialog">校園裡到處都是節能寶藏！點擊 4 個「節能與回收標章」來通關！</p>
            </div>
        </div>
        <div class="w-full h-[65%] md:h-full md:w-7/12 bg-gray-50 flex items-center justify-center p-8">
            <div class="grid grid-cols-2 gap-6">
                <button onclick="found(this)" class="text-7xl p-8 bg-white rounded-3xl shadow-xl hover:bg-emerald-50 active:scale-95 transition">♻️</button>
                <button onclick="found(this)" class="text-7xl p-8 bg-white rounded-3xl shadow-xl hover:bg-emerald-50 active:scale-95 transition">🔋</button>
                <button onclick="found(this)" class="text-7xl p-8 bg-white rounded-3xl shadow-xl hover:bg-emerald-50 active:scale-95 transition">🏷️</button>
                <button onclick="found(this)" class="text-7xl p-8 bg-white rounded-3xl shadow-xl hover:bg-emerald-50 active:scale-95 transition">🌿</button>
            </div>
        </div>
    </div>
    <script>
        let count = 0;
        function found(btn) {
            btn.style.opacity = '0.3';
            btn.disabled = true;
            count++;
            if (count >= 4) {
                document.getElementById('dialog').innerText = "冒險王當之無愧！去找虎妹特訓吧！";
                setTimeout(() => { window.location.href = 'level4.html'; }, 1500);
            }
        }
    </script>
</body>
</html>
