// ===============================
// GitHub Actions（.github/workflows/daily.yml）
// 每天自動跑
// ===============================

/*
name: Generate Lobster Script

on:
  schedule:
    - cron: '0 1 * * *'  # 每天台灣早上9點

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run generator
        run: |
          node lobster-generator.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lobster.html
          git commit -m "daily lobster update" || echo "no changes"
          git push
*/
