<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙：淨零大冒險</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { background: #f0fdf4; font-family: 'PingFang TC', sans-serif; overflow: hidden; touch-action: none; }
        .character-bounce { animation: bounce 4s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        const CHARS = {
            1: { id: 'fern', name: '阿蕨 Fern', file: 'fern.png', color: 'bg-green-500', msg: '釐清碳排脈絡。' },
            2: { id: 'brom', name: '小積 Brom', file: 'brom.png', color: 'bg-blue-500', msg: '落地執行降溫！' },
            3: { id: 'mons', name: '小龜 Monstera', file: 'mons.png', color: 'bg-emerald-500', msg: '尋找節能標誌。' },
            4: { id: 'sans', name: '虎妹 Sans', file: 'sans.png', color: 'bg-slate-700', msg: '夜間特訓捕碳！' },
            5: { id: 'succ', name: '肉肉 Succ', file: 'succ.png', color: 'bg-orange-400', msg: '儲存陽光與水。' },
            6: { id: 'ficus', name: '琴哥 Ficus', file: 'ficus.png', color: 'bg-indigo-500', msg: '優雅平衡音律。' },
            7: { id: 'till', name: '空空 Till', file: 'till.png', color: 'bg-sky-400', msg: '傳送雲端包裹。' }
        };

        const L1_ITEMS = [
            { n: '工廠煙囪', t: 'fire', i: '🏭', h: '直接排放' }, 
            { n: '教室電燈', t: 'bolt', i: '💡', h: '能源使用' }, 
            { n: '牛肉漢堡', t: 'hidden', i: '🍔', h: '間接生命週期' }
        ];

        function App() {
            const [level, setLevel] = useState(1);
            const [score, setScore] = useState(0);
            const [subStep, setSubStep] = useState(0);
            const [dialog, setDialog] = useState("歡迎來到綠色宇宙！我是阿蕨。");

            const nextLevel = () => {
                if (level < 7) {
                    setLevel(level + 1);
                    setSubStep(0);
                    setDialog(CHARS[level+1].msg);
                } else { setLevel(8); }
            };

            const handleL1 = (type) => {
                if (type === L1_ITEMS[subStep].t) {
                    setScore(score + 10);
                    setDialog("做得好！邏輯非常清晰。");
                    setTimeout(() => subStep < 2 ? setSubStep(subStep+1) : nextLevel(), 1200);
                } else {
                    setDialog("哎呀，這個脈絡不對喔，再想想！");
                }
            };

            return (
                <div className="h-screen w-full flex flex-col md:flex-row overflow-hidden bg-white">
                    {/* 左側/上方：IP 角色舞台區 */}
                    <div className={`w-full md:w-5/12 ${level <= 7 ? CHARS[level].color : 'bg-green-600'} transition-colors duration-700 flex flex-col items-center justify-center p-6 relative`}>
                        <AnimatePresence mode="wait">
                            {level <= 7 && (
                                <motion.div 
                                    key={level} 
                                    initial={{ x: -100, opacity: 0 }} 
                                    animate={{ x: 0, opacity: 1 }} 
                                    exit={{ x: -50, opacity: 0 }}
                                    className="relative flex flex-col items-center"
                                >
                                    <img src={CHARS[level].file} className="w-64 md:w-80 h-auto character-bounce drop-shadow-2xl mb-8" />
                                    <div className="bg-white/90 p-6 rounded-2xl shadow-xl w-full max-w-sm border-l-8 border-green-700">
                                        <h2 className="text-2xl font-black text-gray-800 mb-2">{CHARS[level].name}</h2>
                                        <p className="text-lg text-gray-600 font-medium leading-snug">{dialog}</p>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                        {/* 分數顯示 */}
                        <div className="absolute top-6 left-6 bg-black/20 px-4 py-2 rounded-full text-white font-bold tracking-widest">
                            SCORE: {score}
                        </div>
                    </div>

                    {/* 右側/下方：遊戲互動區 */}
                    <div className="w-full md:w-7/12 bg-gray-50 flex flex-col items-center justify-center p-8">
                        <AnimatePresence mode="wait">
                            {level === 1 && (
                                <motion.div key="l1" initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="w-full max-w-md">
                                    <div className="text-center mb-12">
                                        <div className="text-[120px] mb-4 drop-shadow-lg">{L1_ITEMS[subStep].i}</div>
                                        <h3 className="text-3xl font-black text-gray-700">{L1_ITEMS[subStep].n}</h3>
                                        <p className="text-gray-400 mt-2">請分類這個項目的排放脈絡</p>
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <button onClick={()=>handleL1('fire')} className="bg-white hover:bg-red-50 border-4 border-red-500 text-red-600 p-6 rounded-3xl text-2xl font-black shadow-lg transition active:scale-95">🔥 直接排放</button>
                                        <button onClick={()=>handleL1('bolt')} className="bg-white hover:bg-yellow-50 border-4 border-yellow-500 text-yellow-600 p-6 rounded-3xl text-2xl font-black shadow-lg transition active:scale-95">⚡ 電力能源</button>
                                        <button onClick={()=>handleL1('hidden')} className="bg-white hover:bg-blue-50 border-4 border-blue-500 text-blue-600 p-6 rounded-3xl text-2xl font-black shadow-lg transition active:scale-95">🧤 間接生命週期</button>
                                    </div>
                                </motion.div>
                            )}

                            {level >= 2 && level <= 7 && (
                                <motion.div key="other" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="text-center">
                                    <h2 className="text-4xl font-black text-gray-300 mb-8">第 {level} 關開發中</h2>
                                    <button onClick={nextLevel} className="bg-gray-800 text-white px-12 py-6 rounded-full text-2xl font-bold shadow-2xl">
                                        前往下一位夥伴
                                    </button>
                                </motion.div>
                            )}

                            {level === 8 && (
                                <motion.div key="final" initial={{ y: 50 }} animate={{ y: 0 }} className="text-center bg-white p-12 rounded-[3rem] shadow-2xl border-b-8 border-green-500">
                                    <h2 className="text-5xl font-black text-green-700 mb-6">任務大圓滿！</h2>
                                    <p className="text-xl text-gray-500 mb-10 leading-relaxed">你已經獲得了蕨積綠色宇宙的全部智慧。<br/>讓我們一起守護地球！</p>
                                    <div className="flex justify-center gap-2 mb-10 overflow-x-auto p-4">
                                        {[1,2,3,4,5,6,7].map(i => <img key={i} src={CHARS[i].file} className="w-16 h-16 rounded-full border-2 border-green-200" />)}
                                    </div>
                                    <button onClick={()=>window.location.reload()} className="bg-green-600 hover:bg-green-700 text-white px-12 py-5 rounded-full text-2xl font-black shadow-xl transition active:scale-95">
                                        再次冒險
                                    </button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
