<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙：阿蕨的邏輯考驗</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { background: #eefdf4; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { motion, AnimatePresence } = window.Motion;

        // 擴充題目：涵蓋食衣住行
        const LEVEL1_ITEMS = [
            { id: 1, name: '工廠煙囪', type: 'fire', icon: '🏭', hint: '直接排放廢氣...' },
            { id: 2, name: '教室冷氣', type: 'bolt', icon: '❄️', hint: '夏天最耗電的傢伙...' },
            { id: 3, name: '美味牛排', type: 'hidden', icon: '🥩', hint: '養牛的過程會產生溫室氣體...' },
            { id: 4, name: '瓦斯爐火', type: 'fire', icon: '🔥', hint: '燃燒瓦斯煮飯中...' },
            { id: 5, name: '捷運列車', type: 'bolt', icon: '🚇', hint: '雖然環保，但它是吃電的...' },
            { id: 6, name: '手搖飲料', type: 'hidden', icon: '🧋', hint: '杯子跟運送都有碳排...' },
            { id: 7, name: '外送機車', type: 'fire', icon: '🛵', hint: '汽油燃燒噴煙中...' },
            { id: 8, name: '平板電腦', type: 'bolt', icon: '📱', hint: '充電時正在使用電力...' }
        ];

        function App() {
            const [level, setLevel] = useState(1);
            const [score, setScore] = useState(0);
            const [step, setStep] = useState(0);
            const [msg, setMsg] = useState("阿蕨：問題不急，先釐清脈絡。");

            const handleAnswer = (type) => {
                if (type === LEVEL1_ITEMS[step].type) {
                    setScore(score + 10);
                    setMsg("阿蕨：脈絡清晰，邏輯完全正確。");
                    if (step < LEVEL1_ITEMS.length - 1) {
                        setStep(step + 1);
                    } else {
                        setMsg("阿蕨：八項考驗全數通過！邏輯大師是你！");
                        // 這裡可以接下一關小積
                    }
                } else {
                    setScore(Math.max(0, score - 5));
                    setMsg("小積：搞錯啦！這不是那個桶子的！再想一下。");
                }
            };

            return (
                <div className="flex flex-col items-center h-screen p-4 max-w-md mx-auto">
                    {/* 阿蕨對話框 */}
                    <div className="w-full bg-white rounded-2xl shadow-lg p-4 mt-2 border-2 border-green-500 relative">
                        <div className="flex items-center gap-3">
                            <img src="fern.png" className="w-14 h-14 rounded-full border-2 border-green-200" alt="阿蕨" />
                            <div>
                                <p className="font-bold text-green-800">阿蕨 Fern</p>
                                <p className="text-gray-600 text-xs leading-tight">{msg}</p>
                            </div>
                        </div>
                        <div className="absolute top-2 right-4 text-xl font-black text-green-600">{score}</div>
                    </div>

                    {/* 進度條 */}
                    <div className="w-full h-2 bg-gray-200 rounded-full mt-4 overflow-hidden">
                        <div 
                            className="h-full bg-green-500 progress-bar" 
                            style={{ width: `${((step + 1) / LEVEL1_ITEMS.length) * 100}%` }}
                        ></div>
                    </div>

                    {/* 遊戲主體 */}
                    <div className="flex-1 flex flex-col items-center justify-center w-full">
                        <AnimatePresence mode="wait">
                            <motion.div 
                                key={step} 
                                initial={{ y: 20, opacity: 0 }} 
                                animate={{ y: 0, opacity: 1 }} 
                                exit={{ x: -100, opacity: 0 }}
                                className="bg-white p-10 rounded-3xl shadow-2xl mb-8 border-b-8 border-green-100 flex flex-col items-center"
                            >
                                <div className="text-7xl mb-4">{LEVEL1_ITEMS[step].icon}</div>
                                <div className="font-black text-xl text-gray-700">{LEVEL1_ITEMS[step].name}</div>
                                <div className="text-sm text-blue-500 mt-2 italic">「{LEVEL1_ITEMS[step].hint}」</div>
                            </motion.div>
                        </AnimatePresence>

                        {/* 分類按鈕 */}
                        <div className="grid grid-cols-1 gap-3 w-full">
                            <button onClick={() => handleAnswer('fire')} className="bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl shadow-lg flex justify-between items-center transition-transform active:scale-95">
                                <span className="font-bold">🔥 噴火龍 (直接排放)</span>
                                <span className="text-xs opacity-70">自己燃燒廢氣</span>
                            </button>
                            <button onClick={() => handleAnswer('bolt')} className="bg-yellow-400 hover:bg-yellow-500 text-white p-4 rounded-2xl shadow-lg flex justify-between items-center transition-transform active:scale-95">
                                <span className="font-bold text-gray-800">⚡ 閃電俠 (電力排放)</span>
                                <span className="text-xs text-gray-700 opacity-70">插電使用能源</span>
                            </button>
                            <button onClick={() => handleAnswer('hidden')} className="bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl shadow-lg flex justify-between items-center transition-transform active:scale-95">
                                <span className="font-bold">🧤 隱形手 (間接排放)</span>
                                <span className="text-xs opacity-70">製造與運送過程</span>
                            </button>
                        </div>
                    </div>

                    {/* 底部腳註 */}
                    <p className="text-[10px] text-gray-400 mt-4 mb-2 uppercase tracking-widest text-center">
                        Fern+ Green Universe: Level 1 - Logic Master
                    </p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
