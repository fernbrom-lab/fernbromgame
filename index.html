<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙：佛系儲能</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { background: #fff7ed; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .bg-night { background: #0f172a; color: white; }
        .bg-day { background: #eefdf4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [level, setLevel] = useState(1); 
            const [score, setScore] = useState(0);
            const [msg, setMsg] = useState("肉肉：慢慢來，水要存，心情也要。");
            const [waterLevel, setWaterLevel] = useState(0);

            // 第五關：收集資源邏輯
            const collect = (type) => {
                if (type === 'good') {
                    setScore(score + 10);
                    setWaterLevel(prev => Math.min(prev + 20, 100));
                    if (waterLevel >= 80) {
                        setMsg("肉肉：水存滿了，感覺能量充足～準備見琴哥囉。");
                        setTimeout(() => setLevel(6), 2000);
                    }
                } else {
                    setScore(Math.max(0, score - 5));
                    setMsg("肉肉：嗚...這煙味我不喜歡...");
                }
            };

            return (
                <div className={`flex flex-col items-center h-screen p-4 max-w-md mx-auto ${level === 4 ? 'bg-night' : level === 5 ? 'bg-orange-50' : 'bg-day'}`}>
                    {/* 對話框 */}
                    <div className="w-full bg-white rounded-2xl shadow-lg p-4 mt-2 border-2 border-orange-400 z-50 text-black">
                        <div className="flex items-center gap-3">
                            <img src={level === 5 ? 'succ.png' : 'fern.png'} className="w-12 h-12 rounded-full border shadow-sm" />
                            <div className="flex-1">
                                <p className="font-bold text-orange-800 text-sm">{level === 5 ? '肉肉' : '阿蕨'}</p>
                                <p className="text-gray-600 text-[10px] leading-tight">{msg}</p>
                            </div>
                        </div>
                        <div className="text-right text-xl font-black text-orange-600">SCORE: {score}</div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center w-full relative">
                        {level < 5 && (
                            <button className="bg-white text-black p-4 rounded-xl shadow border-2 border-orange-200" onClick={() => setLevel(5)}>
                                直接進入第五關肉肉挑戰
                            </button>
                        )}

                        {level === 5 && (
                            <div className="w-full h-full flex flex-col items-center py-10">
                                {/* 儲水條 */}
                                <div className="w-3/4 h-6 bg-gray-200 rounded-full border-2 border-orange-200 overflow-hidden mb-10">
                                    <motion.div 
                                        className="h-full bg-blue-400" 
                                        animate={{ width: `${waterLevel}%` }}
                                    />
                                </div>

                                <div className="grid grid-cols-3 gap-6 mb-20">
                                    <motion.div whileTap={{scale:0.9}} onClick={()=>collect('good')} className="text-5xl cursor-pointer">💧</motion.div>
                                    <motion.div whileTap={{scale:0.9}} onClick={()=>collect('bad')} className="text-5xl cursor-pointer filter grayscale">☁️</motion.div>
                                    <motion.div whileTap={{scale:0.9}} onClick={()=>collect('good')} className="text-5xl cursor-pointer">☀️</motion.div>
                                </div>

                                {/* 肉肉本體 */}
                                <motion.div 
                                    drag="x" dragConstraints={{left:-100, right:100}}
                                    className="text-center cursor-grab active:cursor-grabbing"
                                >
                                    <img src="succ.png" className="w-32 h-32 rounded-full border-4 border-orange-300 shadow-2xl" />
                                    <p className="font-bold text-orange-600 mt-2 italic tracking-widest">Q彈儲能中...</p>
                                </motion.div>
                                
                                <p className="text-[10px] text-gray-400 mt-10">提示：點擊水滴與陽光來存水！</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
