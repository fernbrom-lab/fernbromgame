<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙：夜間特訓</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { background: #0f172a; font-family: sans-serif; overflow: hidden; touch-action: none; color: white; }
        .bg-day { background: #eefdf4; color: black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [level, setLevel] = useState(1); // 為了展示，你可以手動改成 4 測試
            const [score, setScore] = useState(0);
            const [carbonCaught, setCarbonCaught] = useState(0);
            const [msg, setMsg] = useState("虎妹：半夜運動最安靜，準備好補碳了嗎？");

            // 第四關：補碳邏輯
            const catchCarbon = () => {
                setScore(score + 5);
                setCarbonCaught(prev => prev + 1);
                if (carbonCaught >= 9) {
                    setMsg("虎妹：特訓完成！空氣變清新了。下位教主準備好了嗎？");
                    setTimeout(() => setLevel(5), 2000); // 通往第五關肉肉
                }
            };

            return (
                <div className={`flex flex-col items-center h-screen p-4 max-w-md mx-auto ${level < 4 ? 'bg-day' : ''}`}>
                    {/* 對話框 */}
                    <div className="w-full bg-white rounded-2xl shadow-lg p-4 mt-2 border-2 border-green-500 z-50 text-black">
                        <div className="flex items-center gap-3">
                            <img src={level === 4 ? 'sans.png' : 'fern.png'} className="w-12 h-12 rounded-full border shadow-sm" />
                            <div className="flex-1">
                                <p className="font-bold text-green-800 text-sm">{level === 4 ? '虎妹' : '阿蕨'}</p>
                                <p className="text-gray-600 text-[10px] leading-tight">{msg}</p>
                            </div>
                        </div>
                        <div className="text-right text-xl font-black text-green-600">SCORE: {score}</div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center w-full relative">
                        {level < 4 && (
                            <button className="bg-white text-black p-4 rounded-xl shadow" onClick={() => setLevel(4)}>
                                點擊直接進入第四關 (測試用)
                            </button>
                        )}

                        {level === 4 && (
                            <div className="w-full h-full flex flex-col items-center justify-center overflow-hidden">
                                <p className="text-xs text-blue-300 mb-4">點擊飄過的「二氧化碳分子 🌑」進行淨化！</p>
                                
                                {/* 模擬飄過的碳分子 */}
                                <div className="h-64 w-full relative">
                                    <AnimatePresence>
                                        {[...Array(3)].map((_, i) => (
                                            <motion.div
                                                key={carbonCaught + i}
                                                initial={{ x: -100, y: Math.random() * 200, opacity: 0 }}
                                                animate={{ x: 500, opacity: 1 }}
                                                transition={{ duration: 3, repeat: Infinity, delay: i * 1.5 }}
                                                onClick={catchCarbon}
                                                className="absolute text-4xl cursor-pointer filter grayscale hover:grayscale-0"
                                            >🌑</motion.div>
                                        ))}
                                    </AnimatePresence>
                                    
                                    {/* 虎妹本體 */}
                                    <motion.div 
                                        animate={{ y: [0, -10, 0] }}
                                        transition={{ duration: 2, repeat: Infinity }}
                                        className="absolute bottom-0 left-1/2 -translate-x-1/2 text-center"
                                    >
                                        <img src="sans.png" className="w-28 h-28 rounded-full border-4 border-green-400" />
                                        <div className="bg-green-600 text-[10px] px-2 py-1 rounded mt-2">光合作用特訓中... ({carbonCaught}/10)</div>
                                    </motion.div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <p className="text-[10px] text-gray-500 mb-2">FERN+ GREEN UNIVERSE</p>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
