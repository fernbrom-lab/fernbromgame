<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蕨積綠色宇宙 - 第一關</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        .character-bounce { animation: bounce 3s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="bg-white overflow-hidden">
    <div class="h-screen w-full flex flex-col md:flex-row">
        <div class="w-full h-[35%] md:h-full md:w-5/12 bg-green-500 flex flex-col items-center justify-center p-6 relative">
            <img src="fern.png" class="w-40 md:w-80 character-bounce drop-shadow-2xl mb-4">
            <div class="bg-white/90 p-4 rounded-2xl shadow-xl w-full max-w-sm border-l-8 border-green-700">
                <h2 class="text-xl font-black text-gray-800">阿蕨 Fern</h2>
                <p id="dialog" class="text-base text-gray-600 font-medium">問題不急，先釐清碳排脈絡。請幫我分類這些物件！</p>
            </div>
        </div>

        <div class="w-full h-[65%] md:h-full md:w-7/12 bg-gray-50 flex flex-col items-center justify-center p-8">
            <div id="game-ui" class="text-center w-full max-w-sm">
                <div id="item-icon" class="text-[120px] mb-6">🏭</div>
                <div class="grid gap-4">
                    <button onclick="check(1)" class="bg-white border-4 border-green-500 p-6 rounded-2xl text-2xl font-bold hover:bg-green-50 active:scale-95 transition">直接排放 (Scope 1)</button>
                    <button onclick="check(0)" class="bg-white border-4 border-gray-200 p-6 rounded-2xl text-2xl font-bold text-gray-400">其他分類</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let step = 0;
        const items = [
            { icon: '🏭', dialog: '做得好！工廠煙囪是直接排放。那電燈呢？' },
            { icon: '💡', dialog: '沒錯，電力是能源使用。最後是漢堡？' },
            { icon: '🍔', dialog: '太棒了！這是間接生命週期。去找小積吧！' }
        ];

        function check(isCorrect) {
            if (isCorrect) {
                if (step < items.length - 1) {
                    step++;
                    document.getElementById('item-icon').innerText = items[step].icon;
                    document.getElementById('dialog').innerText = items[step].dialog;
                } else {
                    document.getElementById('dialog').innerText = "脈絡釐清了，去找小積落地執行！";
                    setTimeout(() => { window.location.href = 'level2.html'; }, 1500);
                }
            } else {
                document.getElementById('dialog').innerText = "哎呀，這個分類不對喔，再想想！";
            }
        }
    </script>
</body>
</html>
